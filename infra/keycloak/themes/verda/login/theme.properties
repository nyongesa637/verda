# Verda — Keycloak login theme.
#
# Inherits every FreeMarker template from the stock `keycloak` parent
# theme (login.ftl, error.ftl, login-update-password.ftl, all of them)
# and only overrides the visual chrome via stylesheet + a small message
# bundle override. Form field names, action URLs, and CSRF tokens stay
# identical to upstream, so `make smoke` keeps passing without a single
# byte of OAuth wire-format changing.

parent=keycloak
import=common/keycloak

styles=css/login.css
stylesCommon=
scripts=
