version: 2

updates:
  # Backend (Python)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      python-minor:
        patterns: ["*"]
        update-types: [minor, patch]

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      next-stack:
        patterns: ["next", "react", "react-dom", "eslint-config-next"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "postcss", "autoprefixer"]
      typescript:
        patterns: ["typescript", "@types/*"]
      other-minor:
        patterns: ["*"]
        exclude-patterns:
          ["next", "react*", "tailwindcss", "@tailwindcss/*", "typescript", "@types/*"]
        update-types: [minor, patch]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci(deps)"
      include: scope
